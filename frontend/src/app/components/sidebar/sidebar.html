<aside class="sidebar glass-panel">
  <div class="logo-area">
    <div class="logo-icon"></div>
    <span class="logo-text">Frametric</span>
    <span class="logo-version">v1.2</span>
  </div>

  <nav class="nav-menu">
    <a 
      routerLink="/dashboard"
      routerLinkActive="active"
      class="nav-item"
    >
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="7" height="9" rx="1" />
        <rect x="14" y="3" width="7" height="5" rx="1" />
        <rect x="14" y="12" width="7" height="9" rx="1" />
        <rect x="3" y="16" width="7" height="5" rx="1" />
      </svg>
      <span>Dashboard</span>
      <span class="glow-dot"></span>
    </a>

    <a 
      routerLink="/imports"
      routerLinkActive="active"
      class="nav-item"
    >
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
        <polyline points="17 8 12 3 7 8" />
        <line x1="12" y1="3" x2="12" y2="15" />
      </svg>
      <span>Import Center</span>
      <span class="glow-dot"></span>
    </a>

    <a 
      routerLink="/final-cut-teaser"
      routerLinkActive="active"
      class="nav-item nav-item-wrapped"
    >
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polygon points="12 2 2 7 12 12 22 7 12 2" />
        <polyline points="2 17 12 22 22 17" />
        <polyline points="2 12 12 17 22 12" />
      </svg>
      <span class="wrapped-text">Final Cut</span>
      <span class="glow-dot"></span>
    </a>

    <a 
      routerLink="/stats"
      routerLinkActive="active"
      class="nav-item"
    >
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M18 20V10" />
        <path d="M12 20V4" />
        <path d="M6 20v-6" />
      </svg>
      <span>Advanced Stats</span>
      <span class="glow-dot"></span>
    </a>
  </nav>

  <div class="user-profile-wrapper" style="margin-top: auto; position: relative;">
    <div class="user-profile glass-panel" (click)="toggleUserMenu()" style="margin-top: 0; cursor: pointer; transition: background 0.2s;">
      <div class="avatar">{{ initials() }}</div>
      <div class="user-info">
        <span class="username">{{ auth.currentUser()?.username || 'User' }}</span>
        <span class="role">Cinemaphile Pro</span>
      </div>
    </div>
    
    <div *ngIf="showUserMenu()" class="user-menu glass-panel animate-fade-in" style="position: absolute; bottom: 100%; left: 0; right: 0; margin-bottom: 8px; padding: 8px; z-index: 20;">
      <button (click)="logout()" class="btn btn-secondary" style="width: 100%; justify-content: flex-start; border: none; color: var(--accent-rose); background: transparent;">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" style="margin-right: 8px;">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
          <polyline points="16 17 21 12 16 7"></polyline>
          <line x1="21" y1="12" x2="9" y2="12"></line>
        </svg>
        Sign Out
      </button>
    </div>
  </div>
</aside>
