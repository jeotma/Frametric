<ng-container *ngIf="auth.isAuthenticated(); else unauthenticatedLayout">
  <div class="app-container">
    <!-- Standalone Sidebar Component -->
    <app-sidebar></app-sidebar>

    <!-- Main Content Frame -->
    <main class="main-content">
      <header class="top-bar glass-panel">
        <div class="search-box">
          <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>
          <input type="text" placeholder="Search movies, directors, genres..." (keyup)="onSearchKeyup($event)" />
        </div>
        <div *ngIf="currentSearchEasterEgg() as ee" class="unlocked-badge tooltip-container animate-fade-in" style="display: inline-flex; align-items: center; justify-content: center; margin-left: 12px; cursor: help; background: rgba(16, 185, 129, 0.2); border: 1px solid #10b981; border-radius: 50%; width: 32px; height: 32px; font-size: 1.1rem; animation: pulse-green-badge 2s infinite;">
          🥚
          <span class="tooltip-text" style="width: 200px;">
            <strong>{{ ee.name }}</strong><br>
            {{ ee.desc }}
          </span>
        </div>

        <div class="header-actions">
          <a href="https://www.linkedin.com/in/jesus-otero-dev" target="_blank" class="header-linkedin-link">
            <svg class="linkedin-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
              <path d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.779-1.75-1.75s.784-1.75 1.75-1.75 1.75.779 1.75 1.75-.784 1.75-1.75 1.75zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z"/>
            </svg>
            jesus-otero-dev
          </a>
          <button class="icon-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
              <path d="M13.73 21a2 2 0 0 1-3.46 0" />
            </svg>
          </button>
        </div>
      </header>

      <div class="content-body animate-fade-in">
        <router-outlet></router-outlet>
      </div>
    </main>
  </div>
</ng-container>

<ng-template #unauthenticatedLayout>
  <!-- Standard Router Outlet for auth pages -->
  <router-outlet></router-outlet>
</ng-template>
