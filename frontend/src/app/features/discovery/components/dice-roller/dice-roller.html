<div class="dice-container">
  <div class="die-wrapper die-{{idx}}" *ngFor="let type of diceTypes; let idx = index" 
       [class.rolling]="rolling[idx]"
       [class.settled]="settled[idx]"
       [class.clickable]="!rolling[idx] && (!settled[idx] || (pendingCriticalChoice && values[idx] !== maxValues[idx]))"
       [class.critical-roll]="settled[idx] && values[idx] === maxValues[idx]"
       [class.fumble]="settled[idx] && values[idx] === 1"
       (click)="onDieClick(idx)">
    
    <div class="die-header">
      <span class="die-title">{{ type }}</span>
    </div>
    
    <div class="scene">
      <svg class="die-svg" viewBox="0 0 100 100">
        <defs>
          <radialGradient [attr.id]="'die-grad-' + idx" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#2a2a2d" />
            <stop offset="70%" stop-color="#0e0e11" />
            <stop offset="100%" stop-color="#000000" />
          </radialGradient>
          <linearGradient [attr.id]="'facet-grad-light-' + idx" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#3a3a3d" stop-opacity="0.9" />
            <stop offset="100%" stop-color="#141417" stop-opacity="0.7" />
          </linearGradient>
          <linearGradient [attr.id]="'facet-grad-dark-' + idx" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#1b1b1d" stop-opacity="0.8" />
            <stop offset="100%" stop-color="#050507" stop-opacity="0.95" />
          </linearGradient>
        </defs>

        <!-- D3: Quality (Triangle/Prism) -->
        <ng-container *ngIf="idx === 0">
          <polygon points="50,10 50,60 8,86" [attr.fill]="'url(#facet-grad-light-' + idx + ')'" stroke="var(--accent-silver)" stroke-width="1.5" />
          <polygon points="50,10 92,86 50,60" [attr.fill]="'url(#die-grad-' + idx + ')'" stroke="var(--accent-silver)" stroke-width="1.5" />
          <polygon points="8,86 50,60 92,86" [attr.fill]="'url(#facet-grad-dark-' + idx + ')'" stroke="var(--accent-silver)" stroke-width="1.5" />
          <!-- Accent corner nodes -->
          <circle cx="50" cy="10" r="3" fill="var(--accent-silver)" />
          <circle cx="92" cy="86" r="3" fill="var(--accent-silver)" />
          <circle cx="8" cy="86" r="3" fill="var(--accent-silver)" />
        </ng-container>

        <!-- D4: Rarity (Tetrahedron Projection) -->
        <ng-container *ngIf="idx === 1">
          <polygon points="50,8 50,60 8,84" [attr.fill]="'url(#facet-grad-light-' + idx + ')'" stroke="var(--accent-record)" stroke-width="1.5" />
          <polygon points="50,8 92,84 50,60" [attr.fill]="'url(#die-grad-' + idx + ')'" stroke="var(--accent-record)" stroke-width="1.5" />
          <polygon points="8,84 50,60 92,84" [attr.fill]="'url(#facet-grad-dark-' + idx + ')'" stroke="var(--accent-record)" stroke-width="1.5" />
          <!-- Accent corner nodes -->
          <circle cx="50" cy="8" r="3" fill="var(--accent-record)" />
          <circle cx="92" cy="84" r="3" fill="var(--accent-record)" />
          <circle cx="8" cy="84" r="3" fill="var(--accent-record)" />
        </ng-container>

        <!-- D6: Risk (Isometric Cube) -->
        <ng-container *ngIf="idx === 2">
          <!-- Top face -->
          <polygon points="50,10 90,30 50,50 10,30" [attr.fill]="'url(#facet-grad-light-' + idx + ')'" stroke="var(--accent-sepia)" stroke-width="1.5" />
          <!-- Left face -->
          <polygon points="10,30 50,50 50,90 10,70" [attr.fill]="'url(#facet-grad-dark-' + idx + ')'" stroke="var(--accent-sepia)" stroke-width="1.5" />
          <!-- Right face -->
          <polygon points="50,50 90,30 90,70 50,90" [attr.fill]="'url(#die-grad-' + idx + ')'" stroke="var(--accent-sepia)" stroke-width="1.5" />
          <!-- Corner pips -->
          <circle cx="50" cy="10" r="2.5" fill="var(--accent-sepia)" />
          <circle cx="90" cy="30" r="2.5" fill="var(--accent-sepia)" />
          <circle cx="90" cy="70" r="2.5" fill="var(--accent-sepia)" />
          <circle cx="50" cy="90" r="2.5" fill="var(--accent-sepia)" />
          <circle cx="10" cy="70" r="2.5" fill="var(--accent-sepia)" />
          <circle cx="10" cy="30" r="2.5" fill="var(--accent-sepia)" />
        </ng-container>

        <!-- D12: Complexity (Dodecahedron pentagonal layout) -->
        <ng-container *ngIf="idx === 3">
          <!-- Surrounding pentagons mapped to quads/tris -->
          <polygon points="50,6 92,36 72,48 50,32" [attr.fill]="'url(#facet-grad-light-' + idx + ')'" stroke="var(--accent-emerald)" stroke-width="1.2" />
          <polygon points="92,36 76,86 64,74 72,48" [attr.fill]="'url(#die-grad-' + idx + ')'" stroke="var(--accent-emerald)" stroke-width="1.2" />
          <polygon points="76,86 24,86 36,74 64,74" [attr.fill]="'url(#facet-grad-dark-' + idx + ')'" stroke="var(--accent-emerald)" stroke-width="1.2" />
          <polygon points="24,86 8,36 28,48 36,74" [attr.fill]="'url(#facet-grad-dark-' + idx + ')'" stroke="var(--accent-emerald)" stroke-width="1.2" />
          <polygon points="8,36 50,6 50,32 28,48" [attr.fill]="'url(#facet-grad-light-' + idx + ')'" stroke="var(--accent-emerald)" stroke-width="1.2" />
          <!-- Central pentagonal face -->
          <polygon points="50,32 72,48 64,74 36,74 28,48" [attr.fill]="'url(#die-grad-' + idx + ')'" stroke="var(--accent-emerald)" stroke-width="1.5" />
          <!-- Nodes -->
          <circle cx="50" cy="32" r="2" fill="var(--accent-emerald)" />
          <circle cx="72" cy="48" r="2" fill="var(--accent-emerald)" />
          <circle cx="64" cy="74" r="2" fill="var(--accent-emerald)" />
          <circle cx="36" cy="74" r="2" fill="var(--accent-emerald)" />
          <circle cx="28" cy="48" r="2" fill="var(--accent-emerald)" />
        </ng-container>

        <!-- D20: Exploration (Icosahedron layout) -->
        <ng-container *ngIf="idx === 4">
          <!-- Triangulated outer facets -->
          <polygon points="50,6 88,28 50,28" [attr.fill]="'url(#facet-grad-light-' + idx + ')'" stroke="var(--accent-sepia)" stroke-width="1" />
          <polygon points="50,6 50,28 12,28" [attr.fill]="'url(#facet-grad-light-' + idx + ')'" stroke="var(--accent-sepia)" stroke-width="1" />
          <polygon points="12,28 22,70 50,28" [attr.fill]="'url(#facet-grad-dark-' + idx + ')'" stroke="var(--accent-sepia)" stroke-width="1" />
          <polygon points="12,28 12,72 22,70" [attr.fill]="'url(#facet-grad-dark-' + idx + ')'" stroke="var(--accent-sepia)" stroke-width="1" />
          <polygon points="12,72 50,94 22,70" [attr.fill]="'url(#facet-grad-dark-' + idx + ')'" stroke="var(--accent-sepia)" stroke-width="1" />
          <polygon points="22,70 50,94 78,70" [attr.fill]="'url(#facet-grad-dark-' + idx + ')'" stroke="var(--accent-sepia)" stroke-width="1" />
          <polygon points="50,94 88,72 78,70" [attr.fill]="'url(#facet-grad-dark-' + idx + ')'" stroke="var(--accent-sepia)" stroke-width="1" />
          <polygon points="88,72 88,28 78,70" [attr.fill]="'url(#die-grad-' + idx + ')'" stroke="var(--accent-sepia)" stroke-width="1" />
          <polygon points="88,28 50,28 78,70" [attr.fill]="'url(#die-grad-' + idx + ')'" stroke="var(--accent-sepia)" stroke-width="1" />
          <!-- Central triangle -->
          <polygon points="50,28 78,70 22,70" [attr.fill]="'url(#die-grad-' + idx + ')'" stroke="var(--accent-sepia)" stroke-width="1.5" />
          <!-- Vertices nodes -->
          <circle cx="50" cy="28" r="2.5" fill="var(--accent-sepia)" />
          <circle cx="78" cy="70" r="2.5" fill="var(--accent-sepia)" />
          <circle cx="22" cy="70" r="2.5" fill="var(--accent-sepia)" />
        </ng-container>

        <!-- Value text overlay centered -->
        <text x="50" [attr.y]="idx === 0 || idx === 1 ? 64 : 58" 
              text-anchor="middle" 
              class="die-value-text"
              [class.glowing]="settled[idx] && displayValues[idx] > 0">
          {{ displayValues[idx] > 0 ? displayValues[idx] : '?' }}
        </text>
      </svg>
    </div>

    <!-- Highlighted unified result box under the die -->
    <div class="die-result-box" [class.settled]="settled[idx]">
      <div class="die-result-value" [class.glowing]="settled[idx] && displayValues[idx] > 0">
        {{ displayValues[idx] > 0 ? displayValues[idx] : '?' }}
      </div>
      <div class="die-result-label" [class.visible]="settled[idx] && labels[idx]">
        {{ labels[idx] || 'PENDING' }}
      </div>
    </div>
  </div>
</div>
